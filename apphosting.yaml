# Firebase App Hosting Configuration
# For detailed configuration options, see: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10

# Environment variables mapping (safe for public repositories)
env:
  # The Resend API Key is mapped to a secret in Google Cloud Secret Manager
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
  - variable: CONTACT_RECEIVER_EMAIL
    value: contact@mahbubshihab.com
  - variable: CONTACT_FROM_EMAIL
    value: Portfolio <contact@mahbubshihab.com>
